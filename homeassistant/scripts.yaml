gluetun_vpn_starten:
  alias: Gluetun VPN starten
  mode: single
  sequence:
  - repeat:
      while:
      - condition: template
        value_template: "{{ repeat.index <= 60 and\n    not is_state('sensor.gluetun_vpn_status',
          'running') }}\n"
      sequence:
      - wait_template: '{{ is_state(''binary_sensor.gluetun_api_erreichbar'', ''on'')
          }}

          '
        timeout: 00:00:10
        continue_on_timeout: true
      - service: homeassistant.update_entity
        target:
          entity_id:
          - sensor.gluetun_vpn_status
          - binary_sensor.gluetun_api_erreichbar
      - if:
        - condition: template
          value_template: "{{ is_state('binary_sensor.gluetun_api_erreichbar', 'on')\n
            \   and not is_state('sensor.gluetun_vpn_status', 'running') }}\n"
        then:
        - service: rest_command.gluetun_vpn_start
      - delay: 00:00:05
