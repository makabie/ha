esphome:
  name: "esphome-node-pc"
  friendly_name: PC

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "0ODtvEfomd5flhiMZbks/rBHH5LN+pptL3yYEERpzHk="

ota:


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "MK-W11esp"
    password: "MK-W11esp"

captive_portal:

switch:
  - platform: gpio
    pin: 33
    name: "Power"
    icon: "mdi:power"
    id: power
    on_turn_on:
    - delay: 500ms
    - switch.turn_off: power
  - platform: gpio
    pin: 27
    name: "Reset"
    icon: "mdi:restart"
    id: reset
    on_turn_on:
    - delay: 500ms
    - switch.turn_off: reset
    
binary_sensor:
  - platform: gpio
    device_class: running
    name: "state"
    id: state
    pin:
       number: 25
       inverted: true
       mode:
        input: true
        pullup: true
    filters:
     - delayed_on: 10ms