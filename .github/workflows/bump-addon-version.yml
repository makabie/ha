name: Bump add-on version

on:
  push:
    # main is a protected branch and can't be pushed to directly - bump the
    # version on the feature branch instead, so it merges into main as part
    # of the normal PR flow.
    branches-ignore: [main]
    paths:
      - "netdaemon/**"
      - "github-runner/**"

permissions:
  contents: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[version-bump]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Bump changed add-on versions
        id: bump
        run: |
          bump_version() {
            local dir="$1"
            local file="$dir/config.yaml"
            local current
            current=$(grep -oP '(?<=version: ")[^"]+' "$file")
            IFS='.' read -r major minor patch <<< "$current"
            local next="$major.$minor.$((patch + 1))"
            sed -i "s/version: \"$current\"/version: \"$next\"/" "$file"
            echo "Bumped $dir: $current -> $next"
          }

          changed=""
          if git diff --name-only HEAD~1 HEAD -- netdaemon | grep -q .; then
            bump_version netdaemon
            changed="$changed netdaemon"
          fi
          if git diff --name-only HEAD~1 HEAD -- github-runner | grep -q .; then
            bump_version github-runner
            changed="$changed github-runner"
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.bump.outputs.changed != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add netdaemon/config.yaml github-runner/config.yaml
          git commit -m "chore: bump add-on version(s) [version-bump]"
          git push
